<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sun–Earth–Moon Simulation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #08090d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    font-family: sans-serif;
  }
  #app-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 450px;
    max-height: 800px;
    background: #000000;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-sizing: border-box;
  }
  @media (max-width: 500px), (max-height: 850px) {
    #app-container {
      max-width: 100%;
      max-height: 100%;
      border-radius: 0;
      border: none;
    }
  }
  #info-box {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 2px solid #ffff00;
    padding: 8px 24px;
    text-align: center;
    font-family: monospace;
    z-index: 10;
    width: 260px;
    box-sizing: border-box;
  }
  #phase-title {
    color: #ffff00;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #date-time-row {
    display: flex;
    justify-content: space-between;
    color: white;
    font-size: 16px;
    font-weight: bold;
  }
  #time-text {
    color: #ffff00;
  }
  #app-subtitle {
    position: absolute;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(100, 180, 255, 0.7);
    font-size: 20px;
    font-family: serif;
    font-style: italic;
    letter-spacing: 0.5px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 9;
    user-select: none;
  }
  #playPauseBtn {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    height: 36px;
    z-index: 20;
    font-family: sans-serif;
    font-size: 14px;
    cursor: pointer;
    background: #e1e3e6;
    color: black;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    transition: background-color 0.2s ease;
  }
  #playPauseBtn:hover {
    background: #d4d6d9;
  }
  #constellation-viewport {
    flex: 1;
    width: 100%;
    z-index: 5;
    pointer-events: auto;
  }
  #skysim-viewport {
    position: relative;
    height: 200px;
    width: calc(100% - 16px);
    margin: 52px 8px 8px 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    box-sizing: border-box;
    z-index: 5;
    pointer-events: none;
  }
  #main-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
  }
</style>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/"
    }
  }
</script>
</head>
<body>

<div id="app-container">
  <canvas id="main-canvas"></canvas>

  <button id="playPauseBtn">Pause</button>

  <div id="skysim-viewport">
    <div id="info-box">
      <div id="phase-title">New Moon</div>
      <div id="date-time-row">
        <span id="date-text">May 27, 2026</span>
        <span id="time-text">18:12</span>
      </div>
    </div>
    <div id="app-subtitle">Why Full Moons Rise at Sunset</div>
  </div>

  <div id="constellation-viewport"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();

const container = document.getElementById('app-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('main-canvas'), alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.autoClear = false;

let isPaused = false;
document.getElementById('playPauseBtn').addEventListener('click', (e) => {
  isPaused = !isPaused;
  e.target.innerText = isPaused ? "Play" : "Pause";
});

let daysPassed = 145.7604;
let earthRotation = 145 * 2 * Math.PI + (18.25 * Math.PI / 12);
let moonOrbit = 3.2100;
let moonScaleFlipped = false;

const cameraExternal = new THREE.PerspectiveCamera(60, container.clientWidth/container.clientHeight, 0.1, 1000);
cameraExternal.position.set(5, 4, 8);
cameraExternal.lookAt(0, 0, 0);

const cameraEarth = new THREE.PerspectiveCamera(160, container.clientWidth/container.clientHeight, 0.1, 1000);
const dCam = 0.4;
const cameraMoonCam = new THREE.OrthographicCamera(-dCam, dCam, dCam, -dCam, 0.1, 1000);

let activeCamera = cameraExternal;

const controls = new OrbitControls(cameraExternal, document.getElementById('constellation-viewport'));
controls.target.set(0, 0, 0);
controls.update();

const sunLight = new THREE.PointLight(0xffffff, 2000);
sunLight.position.set(-10, 0, 0);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.15));

const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const posArray = new Float32Array(starsCount * 3);
for(let i = 0; i < starsCount; i++) {
    const r = 40 + Math.random() * 60;
    const theta = 2 * Math.PI * Math.random();
    const phi = Math.acos(2 * Math.random() - 1);
    posArray[i*3] = r * Math.sin(phi) * Math.cos(theta);
    posArray[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    posArray[i*3+2] = r * Math.cos(phi);
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const starsMaterial = new THREE.PointsMaterial({ size: 1.0, sizeAttenuation: false, color: 0xffffff });
const starField = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starField);

const sun = new THREE.Mesh(
  new THREE.SphereGeometry(3, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xffffcc })
);
sun.position.set(-10, 0, 0);
scene.add(sun);

const textureLoader = new THREE.TextureLoader();
const earthTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
const moonTexture = textureLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg');

const sunPivot = new THREE.Object3D();
sunPivot.rotation.y = 73.76875 * 2 * Math.PI / (29.5 * 12);
scene.add(sunPivot);

const earthSystem = new THREE.Object3D();
earthSystem.position.set(0, 0, 0);
sunPivot.add(earthSystem);

const tiltedEarthGroup = new THREE.Object3D();
tiltedEarthGroup.rotation.z = -23.5 * Math.PI / 180;
earthSystem.add(tiltedEarthGroup);

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 32, 32),
  new THREE.MeshStandardMaterial({ map: earthTexture, roughness: 0.6, metalness: 0.1 })
);
earth.rotation.y = earthRotation;
tiltedEarthGroup.add(earth);

const moonOrbitGroup = new THREE.Object3D();
moonOrbitGroup.rotation.z = 25 * Math.PI / 180;
earthSystem.add(moonOrbitGroup);

const moonOrbitPath = new THREE.Mesh(
  new THREE.RingGeometry(1.98, 2.02, 64),
  new THREE.MeshBasicMaterial({ color: 0x888888, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
);
moonOrbitPath.rotation.x = Math.PI / 2;
moonOrbitGroup.add(moonOrbitPath);
window.moonOrbitPath = moonOrbitPath;

window.phaseLabels = [];

const moonPivot = new THREE.Object3D();
moonPivot.rotation.y = moonOrbit;
moonOrbitGroup.add(moonPivot);

const moon = new THREE.Mesh(
  new THREE.SphereGeometry(0.27, 32, 32),
  new THREE.MeshStandardMaterial({ map: moonTexture, roughness: 0.8, metalness: 0.0 })
);
moon.position.set(2, 0, 0);
moonPivot.add(moon);

function createCircleTexture(colorHex) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(128, 128, 128, 0, Math.PI * 2);
  ctx.fillStyle = colorHex;
  ctx.fill();
  return new THREE.CanvasTexture(canvas);
}

// Sky Simulation Setup
const skyCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);
const skyScene = new THREE.Scene();
const horizonScene = new THREE.Scene();

const sunSpriteMatSky = new THREE.SpriteMaterial({ map: createCircleTexture('#ffffaa'), color: 0xffffff });
const skySunSprite = new THREE.Sprite(sunSpriteMatSky);
skySunSprite.scale.set(0.6, 0.6, 1);
skyScene.add(skySunSprite);

// Night stars in sky panel
const skyStarsGeom = new THREE.BufferGeometry();
const skyStarsCount = 300;
const skyStarsPos = new Float32Array(skyStarsCount * 3);
for (let i = 0; i < skyStarsCount; i++) {
  skyStarsPos[i*3]   = (Math.random() - 0.5) * 6;
  skyStarsPos[i*3+1] = Math.random() * 2.0 - 0.15;
  skyStarsPos[i*3+2] = -0.8;
}
skyStarsGeom.setAttribute('position', new THREE.BufferAttribute(skyStarsPos, 3));
const skyStarsMat = new THREE.PointsMaterial({ size: 0.02, sizeAttenuation: false, color: 0xffffff, transparent: true, opacity: 1.0 });
const skyStars = new THREE.Points(skyStarsGeom, skyStarsMat);
skyScene.add(skyStars);

const maskGeom = new THREE.PlaneGeometry(2.2, 0.5);
const maskMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
const skyHorizonMask = new THREE.Mesh(maskGeom, maskMat);
skyHorizonMask.position.set(0, -1.25, -0.5);
horizonScene.add(skyHorizonMask);

const sunSpriteMat = new THREE.SpriteMaterial({ map: createCircleTexture('#ffffcc'), sizeAttenuation: true });
window.sunSprite = new THREE.Sprite(sunSpriteMat);
window.sunSprite.scale.set(6, 6, 1);
sun.add(window.sunSprite);

const moonCanvas = document.createElement('canvas');
moonCanvas.width = 256;
moonCanvas.height = 256;
const moonSpriteTexture = new THREE.CanvasTexture(moonCanvas);
const moonSpriteMat = new THREE.SpriteMaterial({ map: moonSpriteTexture, sizeAttenuation: true });
window.moonSprite = new THREE.Sprite(moonSpriteMat);
window.moonSprite.scale.set(0.54, 0.54, 1);
moon.add(window.moonSprite);

function updateMoonSprite(phaseAngleDeg) {
  const canvas = moonCanvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = canvas.width / 2 - 4;
  
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#222222';
  ctx.fill();
  
  let angle = phaseAngleDeg % 360;
  if (angle < 0) angle += 360;
  
  ctx.fillStyle = '#dddddd';
  if (angle === 180) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  } else if (angle !== 0) {
    const isRightLit = (angle > 0 && angle < 180);
    const cosVal = Math.cos(angle * Math.PI / 180);
    
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, Math.PI / 2, !isRightLit);
    ctx.ellipse(cx, cy, r * Math.abs(cosVal), r, 0, Math.PI / 2, -Math.PI / 2, isRightLit ? (cosVal > 0) : (cosVal < 0));
    ctx.closePath();
    ctx.fill();
  }
  moonSpriteTexture.needsUpdate = true;
}

let speedMode = 'hours';
window.setSpeedMode = function(mode) { speedMode = mode; };
setTimeout(() => setSpeedMode('hours'), 0);

const clockGroup = new THREE.Object3D();
tiltedEarthGroup.add(clockGroup);
window.clockGroup = clockGroup;

const clockRingGeom = new THREE.RingGeometry(1.49, 1.51, 64);
const clockRingMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
const clockRing = new THREE.Mesh(clockRingGeom, clockRingMat);
clockRing.rotation.x = Math.PI / 2;
clockGroup.add(clockRing);

function createClockLabel(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = "Bold 36px Arial";
  ctx.strokeStyle = "rgba(0,0,0,0.8)";
  ctx.lineWidth = 6;
  ctx.strokeText(text, 32, 32);
  ctx.fillStyle = "#ffff00";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, 32, 32);
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.2, 0.2, 1);
  return sprite;
}

for (let h = 1; h <= 24; h++) {
  const label = createClockLabel(h.toString());
  const theta = (24 - h) * Math.PI / 12;
  const radius = 1.65;
  label.position.set(radius * Math.cos(theta), 0, radius * Math.sin(theta));
  clockGroup.add(label);
}

const horizonPlane = new THREE.Mesh(
  new THREE.RingGeometry(0.98, 5000, 64),
  new THREE.MeshBasicMaterial({ color: 0x011a01, side: THREE.DoubleSide })
);
horizonPlane.position.set(1.0, 0, 0);
horizonPlane.rotation.y = Math.PI / 2;
earth.add(horizonPlane);

const viewArrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(1.0,0,0), 0.5, 0x00aaff, 0.15, 0.1);
earth.add(viewArrow);

const sunArrow = new THREE.ArrowHelper(new THREE.Vector3(-1,0,0), new THREE.Vector3(0,0,0), 0.5, 0xffff00, 0.15, 0.1);
earthSystem.add(sunArrow);
window.sunArrow = sunArrow;

const sunArrowCanvas = document.createElement('canvas');
sunArrowCanvas.width = 512;
sunArrowCanvas.height = 128;
const sunArrowTexture = new THREE.CanvasTexture(sunArrowCanvas);
const sunArrowSpriteMat = new THREE.SpriteMaterial({ map: sunArrowTexture, transparent: true, depthTest: false });
const sunArrowSprite = new THREE.Sprite(sunArrowSpriteMat);
sunArrowSprite.scale.set(4.5, 1.125, 1);
earthSystem.add(sunArrowSprite);
window.sunArrowSprite = sunArrowSprite;

const moonArrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), 0.5, 0xdddddd, 0.15, 0.1);
earthSystem.add(moonArrow);
window.moonArrow = moonArrow;

const angleCanvas = document.createElement('canvas');
angleCanvas.width = 512;
angleCanvas.height = 128;
const angleTexture = new THREE.CanvasTexture(angleCanvas);
const angleSpriteMat = new THREE.SpriteMaterial({ map: angleTexture, transparent: true, depthTest: false });
const angleSprite = new THREE.Sprite(angleSpriteMat);
angleSprite.scale.set(3.0, 0.75, 1);
earthSystem.add(angleSprite);
window.angleSprite = angleSprite;

const arcSegments = 32;

// Arc from zenith→Sun (yellow)
const arcSunGeometry = new THREE.BufferGeometry();
const arcSunPositions = new Float32Array((arcSegments + 1) * 3);
arcSunGeometry.setAttribute('position', new THREE.BufferAttribute(arcSunPositions, 3));
const arcSunMaterial = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.0, depthTest: false });
const arcSunLine = new THREE.Line(arcSunGeometry, arcSunMaterial);
earthSystem.add(arcSunLine);
window.arcLine = arcSunLine; // backward compat

// Arc from zenith→Moon (grey-white)
const arcMoonGeometry = new THREE.BufferGeometry();
const arcMoonPositions = new Float32Array((arcSegments + 1) * 3);
arcMoonGeometry.setAttribute('position', new THREE.BufferAttribute(arcMoonPositions, 3));
const arcMoonMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.0, depthTest: false });
const arcMoonLine = new THREE.Line(arcMoonGeometry, arcMoonMaterial);
earthSystem.add(arcMoonLine);
window.arcMoonLine = arcMoonLine;

let lastAngleText = "";
function updateAngleText(text) {
  if (lastAngleText === text) return;
  lastAngleText = text;
  const canvas = angleCanvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (text) {
    ctx.font = "Bold 48px Arial";
    ctx.strokeStyle = "rgba(0,0,0,0.8)";
    ctx.lineWidth = 8;
    ctx.strokeText(text, 256, 64);
    ctx.fillStyle = "#ffcc00";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 256, 64);
  }
  angleTexture.needsUpdate = true;
}

// Moon angle label (grey)
const angleMoonCanvas = document.createElement('canvas');
angleMoonCanvas.width = 512;
angleMoonCanvas.height = 128;
const angleMoonTexture = new THREE.CanvasTexture(angleMoonCanvas);
const angleMoonSpriteMat = new THREE.SpriteMaterial({ map: angleMoonTexture, transparent: true, depthTest: false });
const angleMoonSprite = new THREE.Sprite(angleMoonSpriteMat);
angleMoonSprite.scale.set(3.0, 0.75, 1);
earthSystem.add(angleMoonSprite);
window.angleMoonSprite = angleMoonSprite;

let lastAngleMoonText = "";
function updateAngleMoonText(text) {
  if (lastAngleMoonText === text) return;
  lastAngleMoonText = text;
  const ctx = angleMoonCanvas.getContext('2d');
  ctx.clearRect(0, 0, angleMoonCanvas.width, angleMoonCanvas.height);
  if (text) {
    ctx.font = "Bold 48px Arial";
    ctx.strokeStyle = "rgba(0,0,0,0.8)";
    ctx.lineWidth = 8;
    ctx.strokeText(text, 256, 64);
    ctx.fillStyle = "#aaaaaa";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 256, 64);
  }
  angleMoonTexture.needsUpdate = true;
}

let lastSunArrowText = "";
let lastSunArrowColor = "";
function updateSunArrowText(text, colorHex) {
  if (lastSunArrowText === text && lastSunArrowColor === colorHex) return;
  lastSunArrowText = text;
  lastSunArrowColor = colorHex;
  const canvas = sunArrowCanvas;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (text) {
    ctx.font = "Bold 56px Arial";
    ctx.strokeStyle = "rgba(0,0,0,0.8)";
    ctx.lineWidth = 10;
    ctx.strokeText(text, 256, 64);
    ctx.fillStyle = colorHex;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 256, 64);
  }
  sunArrowTexture.needsUpdate = true;
}

window.toggleCamera = function() {
  activeCamera = (activeCamera === cameraExternal) ? cameraEarth : cameraExternal;
};

function updateEarthCamera() {
  const localObserverPos = new THREE.Vector3(0.82, 0, 0);
  const observerPos = earth.localToWorld(localObserverPos.clone());
  cameraEarth.position.copy(observerPos);
  const headAngleDeg = 270;
  const headAngleRad = headAngleDeg * Math.PI / 180;
  const zenithDir = new THREE.Vector3(1, 0, 0).transformDirection(earth.matrixWorld);
  window.currentZenithDir = zenithDir.clone();
  const lookTarget = observerPos.clone().add(zenithDir);
  const localUp = new THREE.Vector3(0, Math.cos(headAngleRad), Math.sin(headAngleRad));
  const worldUp = localUp.clone().transformDirection(earth.matrixWorld);
  cameraEarth.up.copy(worldUp);
  cameraEarth.lookAt(lookTarget);
}

function animate() {
  requestAnimationFrame(animate);

  const sunDir = new THREE.Vector3();
  sun.getWorldPosition(sunDir);
  const earthPosWorld = new THREE.Vector3();
  earth.getWorldPosition(earthPosWorld);
  const moonPosWorld = new THREE.Vector3();
  moon.getWorldPosition(moonPosWorld);

  const toSun = sunDir.clone().sub(earthPosWorld).normalize();
  const toMoon = moonPosWorld.clone().sub(earthPosWorld).normalize();

  const zenithDir = new THREE.Vector3(1, 0, 0).transformDirection(earth.matrixWorld);
  const sunElevation = toSun.dot(zenithDir);
  const moonElevation = toMoon.dot(zenithDir);
  window.currentZenithDir = zenithDir;
  window.moonElevation = moonElevation;

  const eastDir = new THREE.Vector3(0, 0, 1).transformDirection(earth.matrixWorld);
  const isSunrise = (toSun.dot(eastDir) < 0);
  
  const transitionColor = new THREE.Color(0x0a1931);
  const skyColor = new THREE.Color(0x000000);
  if (sunElevation > -0.17 && sunElevation <= 0.0) {
      const t = (sunElevation + 0.17) / 0.17;
      skyColor.copy(new THREE.Color(0x000000)).lerp(transitionColor, t);
  } else if (sunElevation > 0.0 && sunElevation <= 0.17) {
      const t = sunElevation / 0.17;
      skyColor.copy(transitionColor).lerp(new THREE.Color(0x2863B5), t);
  } else if (sunElevation > 0.17) {
      skyColor.setHex(0x2863B5);
  }
  window.currentSkyColor = skyColor;

  const sunDir2D = new THREE.Vector2(toSun.x, toSun.z).normalize();
  const moonDir2D = new THREE.Vector2(toMoon.x, toMoon.z).normalize();
  let angleBetween = Math.atan2(moonDir2D.y, moonDir2D.x) - Math.atan2(sunDir2D.y, sunDir2D.x);
  if (angleBetween < 0) angleBetween += Math.PI * 2;
  let phaseAngleDeg = angleBetween * 180 / Math.PI;

  let absAngleDeg = Math.min(phaseAngleDeg, 360 - phaseAngleDeg);
  let isNearNewOrFull = (absAngleDeg < 20.0 || absAngleDeg > 160.0);

  let targetSpeedMode = 'days';
  if (isNearNewOrFull) {
    if (Math.abs(sunElevation) <= 0.18) targetSpeedMode = 'minutes';
    else targetSpeedMode = 'hours';
  } else {
    targetSpeedMode = 'days';
  }

  if (speedMode !== targetSpeedMode) setSpeedMode(targetSpeedMode);

  let speed = 1.0;
  if (speedMode === 'minutes') speed = 0.02;
  else if (speedMode === 'hours') speed = 0.5;
  else speed = 4.0;

  const EARTH_ROT_SPEED = 0.05 * speed;
  const MOON_ORBIT_SPEED = EARTH_ROT_SPEED / 29.5;
  const EARTH_ORBIT_SPEED = MOON_ORBIT_SPEED / 12;

  if (!isPaused) {
    earthRotation += EARTH_ROT_SPEED;
    moonOrbit += MOON_ORBIT_SPEED;
    daysPassed += (EARTH_ROT_SPEED / (Math.PI * 2));
  }

  earth.rotation.y = earthRotation;
  moonPivot.rotation.y = moonOrbit;
  moon.rotation.y = moonOrbit;

  let phaseName = "";
  if (phaseAngleDeg < 30 || phaseAngleDeg > 330) phaseName = "New Moon";
  else if (phaseAngleDeg > 150 && phaseAngleDeg < 210) phaseName = "Full Moon";
  else if (Math.abs(phaseAngleDeg - 90) < 5) phaseName = "First Quarter";
  else if (Math.abs(phaseAngleDeg - 270) < 5) phaseName = "Last Quarter";
  else if (phaseAngleDeg >= 30 && phaseAngleDeg <= 90) phaseName = "Waxing Crescent";
  else if (phaseAngleDeg > 90 && phaseAngleDeg <= 150) phaseName = "Waxing Gibbous";
  else if (phaseAngleDeg >= 210 && phaseAngleDeg < 270) phaseName = "Waning Gibbous";
  else phaseName = "Waning Crescent";

  updateMoonSprite(phaseAngleDeg);

  let sunEventText = "";
  if (sunElevation > -0.18 && sunElevation <= 0.18) {
     if (toSun.dot(eastDir) < 0) sunEventText = "Sunrise";
     else sunEventText = "Sunset";
  }
  window.sunEventText = sunEventText;

  const localToSun = earthSystem.worldToLocal(sunDir.clone()).normalize();
  sunArrow.setDirection(localToSun);

  let targetSunArrowLength = 0.5;
  if (speedMode === 'minutes' && (sunEventText === 'Sunrise' || sunEventText === 'Sunset')) {
    targetSunArrowLength = 10.0;
  }
  if (window.currentSunArrowLength === undefined) window.currentSunArrowLength = 0.5;
  window.currentSunArrowLength += (targetSunArrowLength - window.currentSunArrowLength) * 0.05;
  
  const sunHeadLength = 0.15 + (window.currentSunArrowLength - 0.5) * (0.25 / 9.5);
  const sunHeadWidth = 0.1 + (window.currentSunArrowLength - 0.5) * (0.15 / 9.5);
  sunArrow.setLength(window.currentSunArrowLength, sunHeadLength, sunHeadWidth);

  const tColor = Math.max(0, Math.min(1, (sunElevation - (-0.18)) / 0.36));
  const arrowColor = new THREE.Color(0x000000).lerp(new THREE.Color(0xffff00), tColor);
  sunArrow.setColor(arrowColor);

  let labelColor = "#" + arrowColor.getHexString();
  if (sunEventText === "Sunrise") labelColor = "#ffff00";
  else if (sunEventText === "Sunset") labelColor = "#ff0000";
  const eventNameText = (sunEventText === "Sunrise" || sunEventText === "Sunset") ? sunEventText : "";
  updateSunArrowText(eventNameText, labelColor);
  
  const spritePos = localToSun.clone().multiplyScalar(window.currentSunArrowLength + 0.4);
  sunArrowSprite.position.copy(spritePos);
  
  const arrowT = (window.currentSunArrowLength - 0.5) / 9.5;
  sunArrowSprite.material.opacity = Math.max(0, Math.min(1, arrowT));

  const localToMoon = earthSystem.worldToLocal(moonPosWorld.clone()).normalize();
  moonArrow.setDirection(localToMoon);

  // Moon arrow only extends to arc-intersection length (arcRadius = sunArrowLength * 0.4)
  const moonArcIntersect = window.currentSunArrowLength * 0.4;
  let targetMoonArrowLength = 0.5;
  if (speedMode === 'minutes' && (sunEventText === 'Sunrise' || sunEventText === 'Sunset')) targetMoonArrowLength = moonArcIntersect;
  if (window.currentMoonArrowLength === undefined) window.currentMoonArrowLength = 0.5;
  window.currentMoonArrowLength += (targetMoonArrowLength - window.currentMoonArrowLength) * 0.05;

  const moonHeadLength = 0.15 + (window.currentMoonArrowLength - 0.5) * (0.05 / 3.5);
  const moonHeadWidth = 0.1 + (window.currentMoonArrowLength - 0.5) * (0.03 / 3.5);
  moonArrow.setLength(window.currentMoonArrowLength, moonHeadLength, moonHeadWidth);

  // Blue viewArrow: animate to reach arc radius so it meets the arcs as they form
  const targetViewArrowLength = (speedMode === 'minutes' && (sunEventText === 'Sunrise' || sunEventText === 'Sunset'))
    ? moonArcIntersect
    : 0.5;
  if (window.currentViewArrowLength === undefined) window.currentViewArrowLength = 0.5;
  window.currentViewArrowLength += (targetViewArrowLength - window.currentViewArrowLength) * 0.05;
  viewArrow.setLength(window.currentViewArrowLength, 0.15, 0.1);

  // Two-angle arcs: observer→Sun and observer→Moon (each measured from zenith)
  // localZenith: the "up" direction from the observer, expressed in earthSystem space
  const localZenith = earthSystem.worldToLocal(
    earthPosWorld.clone().add(zenithDir)
  ).sub(earthSystem.worldToLocal(earthPosWorld.clone())).normalize();

  const arcRadius = window.currentSunArrowLength * 0.4;
  const tempVec2 = new THREE.Vector3();

  // Sun arc: zenith → localToSun (yellow)
  const sunAngleRad = localZenith.angleTo(localToSun);
  const sunAngleDeg = sunAngleRad * 180 / Math.PI;
  updateAngleText(`☀ ${sunAngleDeg.toFixed(1)}°`);
  {
    const qS = new THREE.Quaternion().setFromUnitVectors(localZenith, localToSun);
    const posSun = arcSunGeometry.attributes.position.array;
    for (let i = 0; i <= arcSegments; i++) {
      const t = i / arcSegments;
      const q = new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(), qS, t);
      tempVec2.copy(localZenith).applyQuaternion(q).multiplyScalar(arcRadius);
      posSun[i * 3] = tempVec2.x;
      posSun[i * 3 + 1] = tempVec2.y;
      posSun[i * 3 + 2] = tempVec2.z;
    }
    arcSunGeometry.attributes.position.needsUpdate = true;
    arcSunMaterial.opacity = Math.max(0, Math.min(1, arrowT));
  }
  // Sun angle label: halfway between zenith and sun direction
  {
    const qMid = new THREE.Quaternion().setFromUnitVectors(localZenith, localToSun);
    const midQ = new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(), qMid, 0.5);
    const midDir = localZenith.clone().applyQuaternion(midQ).normalize();
    angleSprite.position.copy(midDir.multiplyScalar(arcRadius * 1.3));
    angleSprite.material.opacity = Math.max(0, Math.min(1, arrowT));
  }

  // Moon arc: zenith → localToMoon (grey)
  const moonAngleRad = localZenith.angleTo(localToMoon);
  const moonAngleDeg = moonAngleRad * 180 / Math.PI;
  updateAngleMoonText(`☽ ${moonAngleDeg.toFixed(1)}°`);
  {
    const qM = new THREE.Quaternion().setFromUnitVectors(localZenith, localToMoon);
    const posMoon = arcMoonGeometry.attributes.position.array;
    for (let i = 0; i <= arcSegments; i++) {
      const t = i / arcSegments;
      const q = new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(), qM, t);
      tempVec2.copy(localZenith).applyQuaternion(q).multiplyScalar(arcRadius);
      posMoon[i * 3] = tempVec2.x;
      posMoon[i * 3 + 1] = tempVec2.y;
      posMoon[i * 3 + 2] = tempVec2.z;
    }
    arcMoonGeometry.attributes.position.needsUpdate = true;
    arcMoonMaterial.opacity = Math.max(0, Math.min(1, arrowT));
  }
  // Moon angle label: halfway between zenith and moon direction
  {
    const qMid = new THREE.Quaternion().setFromUnitVectors(localZenith, localToMoon);
    const midQ = new THREE.Quaternion().slerpQuaternions(new THREE.Quaternion(), qMid, 0.5);
    const midDir = localZenith.clone().applyQuaternion(midQ).normalize();
    angleMoonSprite.position.copy(midDir.multiplyScalar(arcRadius * 1.3));
    angleMoonSprite.material.opacity = Math.max(0, Math.min(1, arrowT));
  }

  cameraMoonCam.position.copy(earthPosWorld);
  cameraMoonCam.position.add(toMoon.clone().multiplyScalar(1.2)); 
  cameraMoonCam.up.copy(zenithDir);
  cameraMoonCam.lookAt(moonPosWorld);
  
  updateEarthCamera();

  if (activeCamera === cameraExternal) {
    controls.enabled = true;
    controls.update();
  } else {
    controls.enabled = false;
  }

  function setupSceneForCamera(cam) {
    earth.visible = true;
    if(window.moonOrbitPath) window.moonOrbitPath.visible = true;
    if(window.phaseLabels) window.phaseLabels.forEach(l => l.visible = true);
    if(window.clockGroup) window.clockGroup.visible = true;

    if (cam === cameraExternal) {
      sun.material.visible = true;
      window.sunSprite.visible = false;
      moon.material.visible = true;
      if (window.moonSprite) window.moonSprite.visible = false;
      if (window.sunArrow) window.sunArrow.visible = true;
      if (window.sunArrowSprite) window.sunArrowSprite.visible = (window.currentSunArrowLength > 0.6 && (window.sunEventText === 'Sunrise' || window.sunEventText === 'Sunset'));
      if (window.moonArrow) window.moonArrow.visible = true;
      if (window.angleSprite) window.angleSprite.visible = (window.currentSunArrowLength > 0.6 && (window.sunEventText === 'Sunrise' || window.sunEventText === 'Sunset'));
      if (window.angleMoonSprite) window.angleMoonSprite.visible = (window.currentSunArrowLength > 0.6 && (window.sunEventText === 'Sunrise' || window.sunEventText === 'Sunset'));
      if (window.arcLine) window.arcLine.visible = (window.currentSunArrowLength > 0.6 && (window.sunEventText === 'Sunrise' || window.sunEventText === 'Sunset'));
      if (window.arcMoonLine) window.arcMoonLine.visible = (window.currentSunArrowLength > 0.6 && (window.sunEventText === 'Sunrise' || window.sunEventText === 'Sunset'));
      
      scene.background = new THREE.Color(0x000000);
      starField.visible = true;
      starsMaterial.transparent = false;
      starsMaterial.opacity = 1.0;
      horizonPlane.visible = false;
      viewArrow.visible = true;
    } else if (cam === cameraMoonCam) {
      sun.material.visible = false;
      window.sunSprite.visible = false;
      earth.visible = false;
      if(window.moonOrbitPath) window.moonOrbitPath.visible = false;
      if(window.phaseLabels) window.phaseLabels.forEach(l => l.visible = false);
      if(window.clockGroup) window.clockGroup.visible = false;
      if (window.sunArrow) window.sunArrow.visible = false;
      if (window.sunArrowSprite) window.sunArrowSprite.visible = false;
      if (window.moonArrow) window.moonArrow.visible = false;
      if (window.angleSprite) window.angleSprite.visible = false;
      if (window.angleMoonSprite) window.angleMoonSprite.visible = false;
      if (window.arcLine) window.arcLine.visible = false;
      if (window.arcMoonLine) window.arcMoonLine.visible = false;
      moon.material.visible = true;
      if (window.moonSprite) window.moonSprite.visible = false;
      scene.background = null;
      starField.visible = false;
      horizonPlane.visible = false;
      viewArrow.visible = false;
    } else {
      if (window.sunArrow) window.sunArrow.visible = false;
      if (window.sunArrowSprite) window.sunArrowSprite.visible = false;
      if (window.moonArrow) window.moonArrow.visible = false;
      if (window.angleSprite) window.angleSprite.visible = false;
      if (window.angleMoonSprite) window.angleMoonSprite.visible = false;
      if (window.arcLine) window.arcLine.visible = false;
      if (window.arcMoonLine) window.arcMoonLine.visible = false;
      sun.material.visible = false;
      window.sunSprite.visible = true;
      if(window.clockGroup) window.clockGroup.visible = false;
      moon.material.visible = false;
      if (window.moonSprite) window.moonSprite.visible = true;
      let sunElevation = 0;
      if (window.currentZenithDir) sunElevation = toSun.dot(window.currentZenithDir);
      scene.background = window.currentSkyColor || new THREE.Color(0x000000);
      if (sunElevation > 0.1) starField.visible = false;
      else if (sunElevation > -0.2) {
         starField.visible = true;
         starsMaterial.transparent = true;
         starsMaterial.opacity = 1.0 - ((sunElevation + 0.2) / 0.3);
      } else {
         starField.visible = true;
         starsMaterial.transparent = true;
         starsMaterial.opacity = 1.0;
      }
      horizonPlane.visible = true;
      viewArrow.visible = false;
    }
  }

  // --- Rendering ---
  renderer.setScissorTest(false);
  renderer.setClearColor(0x000000, 0.0);
  renderer.clear();

  const containerRect = container.getBoundingClientRect();

  // 1. Constellation Viewport
  const constEl = document.getElementById('constellation-viewport');
  const constRect = constEl.getBoundingClientRect();
  const constLeft = Math.round(constRect.left - containerRect.left);
  const constBottom = Math.round(containerRect.bottom - constRect.bottom);
  const constWidth = Math.round(constRect.width);
  const constHeight = Math.round(constRect.height);

  renderer.setViewport(constLeft, constBottom, constWidth, constHeight);
  renderer.setScissor(constLeft, constBottom, constWidth, constHeight);
  renderer.setScissorTest(true);

  setupSceneForCamera(activeCamera);
  renderer.render(scene, activeCamera);

  // 2. Sky Simulation Viewport
  const skyEl = document.getElementById('skysim-viewport');
  const skyRect = skyEl.getBoundingClientRect();
  const skyLeft = Math.round(skyRect.left - containerRect.left) + 1;
  const skyBottom = Math.round(containerRect.bottom - skyRect.bottom) + 1;
  const skyWidth = Math.round(skyRect.width) - 2;
  const skyHeight = Math.round(skyRect.height) - 2;

  renderer.setViewport(skyLeft, skyBottom, skyWidth, skyHeight);
  renderer.setScissor(skyLeft, skyBottom, skyWidth, skyHeight);

  // Background color
  renderer.setClearColor(window.currentSkyColor || new THREE.Color(0x000000), 1.0);
  renderer.clear(true, true, false);

  const eastDirLocal = new THREE.Vector3(0, 0, -1).transformDirection(earth.matrixWorld);
  const zenithDirLocal = new THREE.Vector3(1, 0, 0).transformDirection(earth.matrixWorld);
  cameraMoonCam.up.copy(zenithDirLocal);
  cameraMoonCam.lookAt(moonPosWorld);

  const aspect = skyWidth / skyHeight;
  skyCamera.left = -aspect;
  skyCamera.right = aspect;
  skyCamera.updateProjectionMatrix();

  const U_sun = toSun.dot(zenithDirLocal);
  const E_sun = toSun.dot(eastDirLocal);
  const alpha_sun = Math.atan2(U_sun, E_sun);
  
  const U_moon = toMoon.dot(zenithDirLocal);
  const E_moon = toMoon.dot(eastDirLocal);
  const alpha_moon = Math.atan2(U_moon, E_moon);

  // Sun arc: identical formula to moon arc but radius 1.2x.
  // alpha_sun = atan2(U_sun, E_sun) already computed above — same as moon's alpha_moon.
  // x: aspect * 1.2 * cos(alpha_sun)  — right at sunrise (alpha near 0), left at sunset (alpha near π)
  // y: -0.4 + 1.2 * sin(alpha_sun)    — rises from horizon, peaks at top, descends
  // Visible only when sun is above the horizon (E_sun > 0 means sun in front half)
  const x_sun = aspect * Math.cos(alpha_sun);
  const y_sun = -1.0 + 1.7 * Math.sin(alpha_sun);
  skySunSprite.position.set(x_sun, y_sun, -0.1);
  
  // Convert alpha_sun to degrees and normalize to [-90, 270] range to prevent wrapping
  let alpha_deg = alpha_sun * 180 / Math.PI;
  if (alpha_deg < -90) alpha_deg += 360;
  
  // The sun is visible in the horizon range [-10°, 190°]
  skySunSprite.visible = (alpha_deg > -10 && alpha_deg < 190);
  
  // Dynamic Sun Color Transition
  let sunColor = new THREE.Color(0xffff00);
  if (alpha_deg > -10 && alpha_deg <= 10) {
    // First 20 degrees: Red to Yellow
    const t = (alpha_deg - (-10)) / 20;
    sunColor.lerpColors(new THREE.Color(0xff1100), new THREE.Color(0xffff00), t);
  } else if (alpha_deg > 10 && alpha_deg < 170) {
    // Middle 160 degrees: Pure Yellow
    sunColor.setHex(0xffff00);
  } else if (alpha_deg >= 170 && alpha_deg < 190) {
    // Last 20 degrees: Yellow to Red
    const t = (alpha_deg - 170) / 20;
    sunColor.lerpColors(new THREE.Color(0xffff00), new THREE.Color(0xff1100), t);
  } else {
    // Invisible/Black outside of bounds
    sunColor.setHex(0x000000);
  }
  skySunSprite.material.color.copy(sunColor);

  // Stars: fade in when sun below horizon (matches sky going dark)
  if (sunElevation < -0.17) {
    skyStarsMat.opacity = 1.0;
    skyStars.visible = true;
  } else if (sunElevation < 0.17) {
    skyStarsMat.opacity = 1.0 - ((sunElevation + 0.17) / 0.34);
    skyStars.visible = true;
  } else {
    skyStars.visible = false;
  }

  renderer.render(skyScene, skyCamera);

  // Plan B: Flip Moon X-scale near New Moon while below horizon (invisible)
  if (phaseAngleDeg > 335 && moonElevation < 0 && !moonScaleFlipped) {
    moon.scale.x = -1;
    moon.material.side = THREE.DoubleSide;
    moonScaleFlipped = true;
  } else if (phaseAngleDeg < 25 && moonElevation < 0 && moonScaleFlipped) {
    moon.scale.x = 1;
    moon.material.side = THREE.FrontSide;
    moonScaleFlipped = false;
  }

  // Render 3D Moon using cameraMoonCam inside sky simulation (only when visible within window limits)
  if (U_moon > -0.35) {
    const x_moon_ndc = 1.1 * Math.cos(alpha_moon); // scaled X axis by 0.1
    const moonPixelX = skyLeft + (x_moon_ndc + 1) / 2 * skyWidth;
    const y_moon = -1.0 + 1.1 * Math.sin(alpha_moon); // lowered by 30px (-1.0) and scaled Y axis by 0.1 (1.1)
    const moonPixelY = skyBottom + (y_moon + 1) / 2 * skyHeight;
    const moonSize = Math.min(skyWidth, skyHeight) * 0.4;

    // Intersect the moon viewport scissor with the sky simulation viewport bounds to prevent sudden popping and overflow
    const minX = Math.max(skyLeft, Math.round(moonPixelX - moonSize/2));
    const minY = Math.max(skyBottom, Math.round(moonPixelY - moonSize/2));
    const maxX = Math.min(skyLeft + skyWidth, Math.round(moonPixelX + moonSize/2));
    const maxY = Math.min(skyBottom + skyHeight, Math.round(moonPixelY + moonSize/2));
    const width = Math.max(0, maxX - minX);
    const height = Math.max(0, maxY - minY);

    renderer.setViewport(moonPixelX - moonSize/2, moonPixelY - moonSize/2, moonSize, moonSize);
    renderer.setScissor(minX, minY, width, height);
    renderer.clear(false, true, false);
    
    setupSceneForCamera(cameraMoonCam);
    renderer.render(scene, cameraMoonCam);

    // Restore sky viewport for subsequent renders
    renderer.setViewport(skyLeft, skyBottom, skyWidth, skyHeight);
    renderer.setScissor(skyLeft, skyBottom, skyWidth, skyHeight);
  }

  // Render Horizon Mask
  renderer.setViewport(skyLeft, skyBottom, skyWidth, skyHeight);
  renderer.setScissor(skyLeft, skyBottom, skyWidth, skyHeight);
  renderer.clear(false, false, false);
  renderer.render(horizonScene, skyCamera);

  // Update UI Labels
  const timeEl = document.getElementById("time-text");
  if (timeEl) {
    let angle = earth.rotation.y % (Math.PI * 2);
    if (angle < 0) angle += Math.PI * 2;
    let h = (angle * 12 / Math.PI) % 24;
    let displayHrs = Math.floor(h);
    let mins = Math.floor((h % 1) * 60);
    timeEl.innerText = `${displayHrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
  }
  
  const dateEl = document.getElementById("date-text");
  if (dateEl) {
    const baseDate = new Date(2026, 0, 1);
    baseDate.setDate(baseDate.getDate() + Math.floor(daysPassed));
    dateEl.innerText = baseDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const phaseEl = document.getElementById("phase-title");
  if (phaseEl) phaseEl.innerText = phaseName;
}

animate();

window.addEventListener("resize", () => {
  renderer.setSize(container.clientWidth, container.clientHeight);
  cameraExternal.aspect = container.clientWidth / container.clientHeight;
  cameraExternal.updateProjectionMatrix();
  cameraEarth.aspect = container.clientWidth / container.clientHeight;
  cameraEarth.updateProjectionMatrix();
});
</script>
</body>
</html>
